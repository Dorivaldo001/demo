<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Chat e Vídeo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Topo do Chat */
        .chat-header {
            background-color: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info h3 {
            font-size: 16px;
        }

        .user-info span {
            font-size: 12px;
            color: #d1f4cc;
        }

        .header-actions button {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-left: 15px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .header-actions button:hover {
            background: rgba(255,255,255,0.1);
        }

        .btn-logout {
            background-color: #d32f2f !important;
        }

        /* Área de Mensagens */
        .chat-messages {
            flex: 1;
            padding: 15px;
            background-color: #efeae2;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            background-color: #d9fdd3;
            align-self: flex-end;
        }

        .message.received {
            background-color: #ffffff;
            align-self: flex-start;
        }

        /* Rodapé / Input de Mensagem */
        .chat-input-area {
            padding: 10px;
            background-color: #f0f2f5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area button {
            background-color: #00a884;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input-area button:hover {
            background-color: #008f72;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Cabeçalho -->
        <header class="chat-header">
            <div class="user-info">
                <h3>Atendente Virtual</h3>
                <span id="status-text">Online</span>
            </div>
            <div class="header-actions">
                <button id="btn-video">📹 Chamada</button>
                <button id="btn-sair" class="btn-logout">Sair</button>
            </div>
        </header>

        <!-- Mensagens -->
        <div class="chat-messages" id="chat-messages">
            <div class="message received">Olá! Como posso te ajudar hoje? Envie uma mensagem abaixo.</div>
        </div>

        <!-- Área de Input -->
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Digite uma mensagem..." autocomplete="off">
            <button id="btn-send">Enviar</button>
        </div>
    </div>

    <script>
        // --- SISTEMA DE ÁUDIO (Nativo do Navegador) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Som de Envio (Clique agudo e rápido)
        function playSendSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        // Som de Chamada de Vídeo (Tuuú... Tuuú...)
        let ringtoneInterval;
        function startCallingSound() {
            initAudio();
            
            function playTone() {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(425, audioCtx.currentTime); // Frequência padrão de tom de linha
                
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime + 1.5);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.7);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.7);
            }

            playTone();
            ringtoneInterval = setInterval(playTone, 4000); // Repete o som a cada 4 segundos
        }

        function stopCallingSound() {
            clearInterval(ringtoneInterval);
        }

        // --- SISTEMA DE NOTIFICAÇÕES PUSH ---
        if (typeof Notification !== "undefined" && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }

        function showPushNotification(text) {
            if (typeof Notification !== "undefined" && Notification.permission === 'granted') {
                new Notification("Simulador de Chat", {
                    body: text,
                    icon: "https://cdn-icons-png.flaticon.com/512/134/134937.png"
                });
            }
        }

        // --- MANIPULAÇÃO DO CHAT ---
        const messagesContainer = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const btnSend = document.getElementById('btn-send');
        const btnSair = document.getElementById('btn-sair');
        const btnVideo = document.getElementById('btn-video');
        const statusText = document.getElementById('status-text');

        // Função para renderizar as mensagens na tela
        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', type);
            msgDiv.innerText = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight; // Rola para o fim
        }

        // Ação de Enviar Mensagem
        function processarEnvio() {
            const texto = messageInput.value.trim();
            if (!texto) return;

            // 1. Renderiza na tela e limpa input
            appendMessage(texto, 'sent');
            messageInput.value = '';

            // 2. Toca som de envio
            playSendSound();

            // 3. Simula resposta automática após exatamente 1 minuto (60000ms)
            setTimeout(() => {
                const respostaAutomatica = "Recebi sua mensagem! Essa é uma resposta automatizada gerada após 1 minuto.";
                
                // Exibe no chat
                appendMessage(respostaAutomatica, 'received');
                
                // Dispara o Push do sistema
                showPushNotification(respostaAutomatica);
            }, 60000);
        }

        // --- EVENTOS DOS ELEMENTOS ---

        // Clique no Botão Enviar
        btnSend.addEventListener('click', processarEnvio);

        // Enviar com a tecla Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processarEnvio();
        });

        // Botão Sair -> Voltar para o index.html
        btnSair.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Botão de Vídeo -> Inicia som de chamada e desliga após 12s automaticamente
        btnVideo.addEventListener('click', () => {
            btnVideo.disabled = true;
            statusText.innerText = "Chamando...";
            startCallingSound();

            setTimeout(() => {
                stopCallingSound();
                statusText.innerText = "Online";
                btnVideo.disabled = false;
                alert("A chamada de vídeo não foi atendida.");
            }, 12000); // Para de tocar após 12 segundos (3 bipes)
        });
    </script>
</body>
</html>
